<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Image Slider</title>
  <link rel="stylesheet" href="style2.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

</head>

<body>

  <h2>My Gallery</h2>

  <div class="gallery">
    <img src="https://picsum.photos/id/1055/600/400" alt="img1">
    <img src="https://picsum.photos/id/1065/600/400" alt="img2">
    <img src="https://picsum.photos/id/1075/600/400" alt="img3">
    <img src="https://picsum.photos/id/1045/600/400" alt="img4">

  </div>


  <div id="sliderOverlay">
    <span id="closeBtn">&times;</span>
    <span class="arrow" id="prev">&#10094;</span>
    <img id="sliderImage" src="">
    <span class="arrow" id="next">&#10095;</span>
  </div>

  <script src="script2.js"></script>

</body>

</html>
